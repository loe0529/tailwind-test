# GitHub Pages: 저장소 Settings → Pages → Source 를
# "Deploy from a branch" 로 두고
#   Branch: gh-pages   /    Folder: / (root)
# ⚠️ main 브랜치나 / (root)만 선택하면 소스 index.html이 올라가 빈 화면입니다.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (Vite → dist, base /tailwind-test/)
        env:
          GITHUB_PAGES: 'true'
        run: npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
