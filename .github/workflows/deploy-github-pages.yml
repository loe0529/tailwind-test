# Pages 설정: Source = Deploy from a branch → Branch: main → Folder: /docs
# docs/ 에 Vite 빌드(dist)만 넣고, 루트 소스 index.html 은 Pages에 쓰이지 않음.
# paths-ignore 로 docs/만 바뀌는 커밋(배포 봇)은 다시 빌드하지 않음.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (Vite → dist, base /tailwind-test/)
        env:
          GITHUB_PAGES: 'true'
        run: npm run build

      - name: Deploy dist → main/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: 'chore: deploy GitHub Pages [skip ci]'
